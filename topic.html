    <!-- Хадисы -->

    <!-- Дуа -->

</div>

<footer class="footer">
    © 2026 HIKMAH HUB — Ислам по темам.
</footer>

<script>
async function loadTopic() {
    const params = new URLSearchParams(window.location.search);
    const category = params.get("category");

    if (!category) {
        document.getElementById("topicTitle").textContent = "Тема не найдена";
        return;
    }

    // Загружаем тему из Supabase
    const { data: topic } = await supabase
        .from("topics")
        .select("*")
        .eq("id", category)
        .single();

    if (!topic) {
        document.getElementById("topicTitle").textContent = "Тема не найдена";
        return;
    }

    document.getElementById("topicTitle").textContent = topic.title;
    document.getElementById("topicDescription").textContent = topic.description;

    // Загружаем аяты
    loadSection("ayahs", "ayahList");
    loadSection("hadiths", "hadithList");
    loadSection("dua", "duaList");
    loadSection("tafsir", "tafsirList");
    loadSection("practical", "practicalList");
    loadRelatedTopics(category);
}

async function loadSection(table, elementId) {
    const { data } = await supabase.from(table).select("*");

    const container = document.getElementById(elementId);
    container.innerHTML = "";

    if (!data || data.length === 0) {
        container.innerHTML = "<p>Нет данных.</p>";
        return;
    }

    data.forEach(item => {
        const block = document.createElement("div");
        block.className = "block";
        block.innerHTML = `
            <h4>${item.title || "Без названия"}</h4>
            <p>${item.text || ""}</p>
        `;
        container.appendChild(block);
    });
}

async function loadRelatedTopics(category) {
    const { data } = await supabase
        .from("topics")
        .select("*")
        .neq("id", category);

    const container = document.getElementById("relatedList");
    container.innerHTML = "";

    data.forEach(item => {
        const link = document.createElement("a");
        link.href = "topic.html?category=" + item.id;
        link.className = "card link";
        link.innerHTML = `
            <h3>${item.title}</h3>
            <p>${item.description}</p>
        `;
        container.appendChild(link);
    });
}

loadTopic();
</script>
